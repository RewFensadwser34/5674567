<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>riftmc.club - Minecraft Server</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 25px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-tabs {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 6px;
            gap: 4px;
        }

        .nav-tabs a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .nav-tabs a:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-tabs a.active {
            color: #0a0a0f;
            background: #22d3ee;
        }

        .nav-links {
            display: none;
        }

        .nav-links a {
            display: none;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 100px 60px;
            position: relative;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            align-items: center;
        }

        .hero-left {
            max-width: 600px;
        }

        .version-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #22d3ee;
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .version-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #22d3ee;
            border-radius: 50%;
        }

        .hero-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 42px;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .hero-title .white {
            color: white;
        }

        .typing-text {
            display: inline-block;
            white-space: nowrap;
            overflow: hidden;
        }

        .hero-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .hero-right {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: flex-start;
        }

        .server-box {
            background: rgba(35, 35, 50, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px 25px;
            width: 100%;
            max-width: 400px;
        }

        .server-box-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .server-ip-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .server-ip {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: white;
            letter-spacing: 1px;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .copy-btn.copied {
            background: rgba(34, 197, 94, 0.2);
            border-color: rgba(34, 197, 94, 0.5);
            color: #22c55e;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
        }

        .btn-discord {
            background: #22d3ee;
            color: #1a1a2e;
        }

        .btn-discord:hover {
            background: #06b6d4;
            transform: translateY(-2px);
        }

        .btn-store {
            background: rgba(50, 50, 70, 0.9);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-store:hover {
            background: rgba(40, 40, 60, 0.9);
            transform: translateY(-2px);
        }

        @media (max-width: 1024px) {
            .hero-content {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .hero-right {
                align-items: center;
            }
            .hero-title {
                font-size: 32px;
            }
            .navbar {
                padding: 15px 20px;
            }
            .nav-tabs {
                padding: 4px;
            }
            .nav-tabs a {
                padding: 8px 14px;
                font-size: 12px;
            }
            .hero {
                padding: 100px 30px;
            }
        }

        @media (max-width: 640px) {
            .hero-title {
                font-size: 24px;
            }
            .nav-tabs a {
                padding: 6px 12px;
                font-size: 11px;
            }
            .server-box, .action-buttons {
                max-width: 100%;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <img src="images/wp11018337.jpg" alt="Background" class="bg-image">
    </div>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <img src="images/520d4d2c-ba61-428d-92a6-eba5e09c9db6.png" alt="Donut Logo">
            </div>
        </a>
        <div class="nav-tabs">
            <a href="index.html" class="active"><i class="fas fa-home"></i> Home</a>
            <a href="letterboard.html"><i class="fas fa-trophy"></i> Letterboard</a>
            <a href="rules.html"><i class="fas fa-gavel"></i> Rules</a>
            <a href="#"><i class="fab fa-discord"></i> Discord</a>
        </div>
    </nav>
    <section class="hero">
        <div class="hero-content">
            <div class="hero-left">
                <div class="version-badge">All 1.21 Network</div>
                <h1 class="hero-title">
                    <span class="typing-text white" data-text="A brand new"></span><br>
                    <span class="typing-text yellow" data-text="PvP"></span><br>
                    <span class="typing-text yellow" data-text="experience"></span>
                </h1>
                <p class="hero-subtitle">Join the best PvP server in history</p>
            </div>
            <div class="hero-right">
                <div class="server-box">
                    <div class="server-box-label">Server IP</div>
                    <div class="server-ip-row">
                        <span class="server-ip">riftmc.club</span>
                        <button class="copy-btn" onclick="copyIP()">
                            <i class="far fa-copy"></i>
                            <span>Copy</span>
                        </button>
                    </div>
                </div>
                <div class="action-buttons">
                    <a href="#" class="btn btn-discord">
                        <i class="fab fa-discord"></i>
                        Discord
                    </a>
                    <a href="#" class="btn btn-store">
                        <i class="fas fa-shopping-bag"></i>
                        Store
                    </a>
                </div>
            </div>
        </div>
    </section>
    <script>
        function copyIP() {
            navigator.clipboard.writeText('riftmc.club');
            const btn = document.querySelector('.copy-btn');
            const originalHTML = btn.innerHTML;
            btn.classList.add('copied');
            btn.innerHTML = '<i class="fas fa-check"></i><span>Copied!</span>';
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = originalHTML;
            }, 2000);
        }
    </script>

    <script>
        // Typing animation
        document.addEventListener('DOMContentLoaded', function() {
            const typingElements = document.querySelectorAll('.typing-text');
            let currentElement = 0;
            let currentChar = 0;

            function typeText() {
                if (currentElement >= typingElements.length) {
                    return;
                }

                const element = typingElements[currentElement];
                const text = element.getAttribute('data-text');

                if (currentChar < text.length) {
                    element.textContent += text.charAt(currentChar);
                    currentChar++;
                    setTimeout(typeText, 100);
                } else {
                    currentElement++;
                    currentChar = 0;
                    setTimeout(typeText, 300);
                }
            }

            typeText();
        });
    </script>

    <!-- Support Chat Widget -->
    <div id="support-widget" class="support-widget">
        <button id="support-btn" class="support-btn" title="Chat with Support">
            <i class="fas fa-headset"></i>
        </button>
        <div id="chat-container" class="chat-container">
            <div class="chat-header">
                <div class="ai-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="chat-title">
                    <h4>RiftBot</h4>
                    <span class="status">Online</span>
                </div>
                <button id="close-chat" class="close-chat">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div class="message ai-message">
                    <div class="message-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <p>Hey there! I'm RiftBot, your AI assistant. How can I help you today?</p>
                        <span class="message-time">Just now</span>

                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off">
                <button id="send-btn" class="send-btn">

    <style>

            position: fixed;
            bottom: 30px;
            right: 30px;

        }

        .support-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #22d3ee, #22d3ee);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(34, 211, 238, 0.4);
            transition: all 0.3s ease;
            animation: pulse-support 2s infinite;
        }

        .support-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(34, 211, 238, 0.6);
        }

        .support-btn i {

            font-size: 24px;
        }

        @keyframes pulse-support {
            0%, 100% { box-shadow: 0 4px 20px rgba(34, 211, 238, 0.4); }
            50% { box-shadow: 0 4px 30px rgba(34, 211, 238, 0.8); }
        }

        .chat-container {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 350px;
            height: 450px;
            background: rgba(35, 35, 50, 0.98);
            border-radius: 20px;
            border: 1px solid rgba(34, 211, 238, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: none;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .chat-container.active {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-header {
            background: linear-gradient(135deg, #22d3ee, #22d3ee);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ai-avatar {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ai-avatar i {
            color: #1a1a2e;
            font-size: 20px;
        }

        .chat-title {
            flex: 1;
        }

        .chat-title h4 {

            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }

        .chat-title .status {
            color: rgba(26, 26, 46, 0.8);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-title .status::before {

            width: 8px;
            height: 8px;

            border-radius: 50%;

        .close-chat {

        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
        }

        .ai-message {
            align-self: flex-start;
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            background: rgba(34, 211, 238, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message-avatar i {
            color: #22d3ee;
            font-size: 14px;
        }

        .user-message .message-avatar {
            background: rgba(34, 197, 94, 0.2);
        }

        .user-message .message-avatar i {

        }

        .message-content {
            background: rgba(34, 211, 238, 0.15);
            padding: 12px 15px;
            border-radius: 15px;
            border: 1px solid rgba(34, 211, 238, 0.2);
        }

        .user-message .message-content {

        .message-content p {

        .message-time {

        .chat-input-area {
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);

            gap: 10px;
        }

        #chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;

        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #22d3ee, #22d3ee);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        .send-btn i {
            color: #1a1a2e;
            font-size: 16px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 15px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #22d3ee;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        @media (max-width: 480px) {
            .support-widget {
                bottom: 20px;
                right: 20px;
            }
            .chat-container {
                width: calc(100vw - 40px);
                height: 400px;
                right: 0;
            }
        }
    </style>

    <script>
        (function() {
            const supportBtn = document.getElementById('support-btn');
            const chatContainer = document.getElementById('chat-container');
            const closeChat = document.getElementById('close-chat');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const chatMessages = document.getElementById('chat-messages');

            supportBtn.addEventListener('click', () => {
                chatContainer.classList.toggle('active');
            });

            closeChat.addEventListener('click', () => {
                chatContainer.classList.remove('active');
            });

            function sendMessage() {
                const message = chatInput.value.trim();
                if (!message) return;

                addMessage(message, 'user');
                chatInput.value = '';
                showTyping();

                setTimeout(() => {
                    removeTyping();
                    const response = getAIResponse(message);
                    addMessage(response, 'ai');
                }, 1500 + Math.random() * 1000);
            }

            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            function addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}-message`;
                const icon = sender === 'ai' ? 'robot' : 'user';
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                messageDiv.innerHTML = `
                    <div class="message-avatar">
                        <i class="fas fa-${icon}"></i>
                    </div>
                    <div class="message-content">
                        <p>${escapeHtml(text)}</p>
                        <span class="message-time">${time}</span>
                    </div>
                `;
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function showTyping() {
                const typingDiv = document.createElement('div');
                typingDiv.id = 'typing-indicator';
                typingDiv.className = 'message ai-message';
                typingDiv.innerHTML = `
                    <div class="message-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <div class="typing-indicator">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                `;
                chatMessages.appendChild(typingDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function removeTyping() {
                const typing = document.getElementById('typing-indicator');
                if (typing) typing.remove();
            }

            function getAIResponse(message) {
                const lowerMsg = message.toLowerCase();
                if (lowerMsg.includes('hello') || lowerMsg.includes('hi')) return "Hello! Welcome to riftmc.club! How can I help you?";
                if (lowerMsg.includes('ip') || lowerMsg.includes('server')) return "Our server IP is riftmc.club - just copy it and join!";
                if (lowerMsg.includes('discord')) return "Join our Discord! Click the yellow Discord button on the page.";
                if (lowerMsg.includes('store') || lowerMsg.includes('rank')) return "Check out our store for ranks and cosmetics!";
                return "I'm RiftBot! I can help with server info. Ask me about the IP, Discord, or store!";
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        })();
    </script>
</body>
